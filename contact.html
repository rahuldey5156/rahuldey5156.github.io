<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;
  color: #fff;
  font-family: 'Share Tech Mono', monospace;
}

/* NAV (matches index.html / experience.html / skills.html) */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #000;
  border-bottom: 1px solid #00ffff33;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2.5rem;
  height: 52px;
}
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  color: #ccc;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 0.08em;
  transition: color 0.15s;
}
.nav-links a:hover, .nav-links a.active { color: #00ffff; }
.nav-icons { display: flex; align-items: center; gap: 1.2rem; }
.nav-icons a { color: #ccc; transition: color 0.15s; display: flex; align-items: center; }
.nav-icons a:hover { color: #00ffff; }
.nav-icons svg { width: 20px; height: 20px; fill: currentColor; }

.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  width: 28px;
  height: 22px;
  padding: 0;
  cursor: pointer;
  flex-direction: column;
  justify-content: space-between;
}
.nav-toggle span {
  display: block;
  width: 100%;
  height: 2px;
  background: #00ffff;
  transition: transform 0.2s, opacity 0.2s;
}
.nav-toggle.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
.nav-toggle.open span:nth-child(2) { opacity: 0; }
.nav-toggle.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

/* PAGE HEADER */
#contact-header {
  max-width: 900px;
  margin: 0 auto;
  padding: 4rem 2.5rem 0;
}
#contact-header h1 {
  font-size: 2.2rem;
  color: #00ffff;
  letter-spacing: 0.04em;
}

/* CONTACT LIST */
#contact {
  max-width: 900px;
  margin: 0 auto;
  padding: 2.5rem 2.5rem 6rem;
}
.contact-list {
  display: flex;
  flex-direction: column;
}
.contact-row {
  display: grid;
  grid-template-columns: 40px 160px 1fr 24px;
  align-items: center;
  gap: 1.5rem;
  padding: 1.6rem 0;
  border-top: 1px solid #00ffff33;
  text-decoration: none;
  color: inherit;
  transition: background 0.15s;
}
.contact-list a.contact-row:hover { background: #00ffff0d; }
.contact-list .contact-row:last-child { border-bottom: 1px solid #00ffff33; }

.contact-icon {
  width: 22px;
  height: 22px;
  color: #00ffff;
  flex-shrink: 0;
}
.contact-icon svg { width: 100%; height: 100%; fill: currentColor; }

.contact-label {
  font-size: 12px;
  color: #666;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.contact-value {
  font-size: 16px;
  color: #fff;
  letter-spacing: 0.02em;
  word-break: break-word;
}

.contact-arrow {
  font-size: 16px;
  color: #00ffff;
  text-align: right;
  opacity: 0.4;
  transition: opacity 0.15s, transform 0.15s;
}
.contact-list a.contact-row:hover .contact-arrow {
  opacity: 1;
  transform: translateX(3px);
}

/* non-link row (location) needs same layout but no hover/arrow behavior */
.contact-row.static { cursor: default; }
.contact-row.static:hover { background: none; }
.contact-row.static .contact-arrow { opacity: 0; }

@media (max-width: 700px) {
  nav { padding: 0 1.2rem; }
  .nav-toggle { display: flex; }
  .nav-links {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    background: #000;
    border-bottom: 1px solid #00ffff33;
    flex-direction: column;
    gap: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  .nav-links.open { max-height: 300px; }
  .nav-links li { width: 100%; }
  .nav-links a {
    display: block;
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid #00ffff1a;
  }
  .nav-icons { gap: 0.9rem; }

  #contact-header { padding: 3rem 1.5rem 0; }
  #contact { padding: 2rem 1.5rem 4rem; }
  .contact-row {
    grid-template-columns: 32px 1fr 20px;
    grid-template-areas:
      "icon label arrow"
      "icon value arrow";
    row-gap: 0.2rem;
  }
  .contact-icon { grid-area: icon; width: 18px; height: 18px; }
  .contact-label { grid-area: label; }
  .contact-value { grid-area: value; font-size: 14px; }
  .contact-arrow { grid-area: arrow; }
}
</style>
